app = "billiard-club"
primary_region = "waw"  # Варшава — ближайший к СНГ регион

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/club.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[mounts]]
  source = "club_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
